<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Racer</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #1c1c1e);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            touch-action: none; /* Запрет скролла */
        }

        /* Кнопка Домой */
        .home-btn {
            position: absolute; top: 10px; left: 10px; 
            text-decoration: none; font-size: 24px; z-index: 100;
        }

        /* Игровое поле */
        #game-container {
            position: relative;
            width: 300px; /* 3 полосы по 100px */
            height: 500px;
            border: 4px solid #3390ec;
            background-color: #333; /* Цвет асфальта */
            margin-top: 10px;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* ДОРОЖНАЯ РАЗМЕТКА */
        /* Используем градиент для создания пунктирных линий */
        .road-markings {
            position: absolute;
            top: -50px; left: 0; right: 0; bottom: -50px;
            background-image: 
                linear-gradient(#fff 50%, transparent 50%), /* Линия 1 */
                linear-gradient(#fff 50%, transparent 50%); /* Линия 2 */
            background-size: 6px 80px; /* Ширина линии и шаг пунктира */
            background-position: 97px 0, 197px 0; /* Позиции разделителей (примерно 1/3 и 2/3) */
            background-repeat: repeat-y;
            animation: roadAnim 0.8s linear infinite;
            opacity: 0.6;
        }

        @keyframes roadAnim {
            from { transform: translateY(0); }
            to { transform: translateY(80px); }
        }

        /* Игрок */
        #player {
            position: absolute;
            bottom: 20px;
            left: 130px; /* Центр */
            width: 40px;
            height: 70px;
            background-color: #ff3b30;
            border-radius: 6px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            z-index: 10;
            transition: left 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Плавный рывок */
        }
        
        /* Детали машины игрока */
        #player::before { content: ''; position: absolute; top: 5px; left: 3px; width: 6px; height: 10px; background: #ffcc00; border-radius: 2px; box-shadow: 28px 0 0 #ffcc00; }
        #player::after { content: ''; position: absolute; bottom: 5px; left: 3px; width: 6px; height: 6px; background: #550000; border-radius: 2px; box-shadow: 28px 0 0 #550000; }
        #player .stripe { position: absolute; top: 0; left: 15px; width: 10px; height: 100%; background: rgba(0,0,0,0.2); }

        /* Враги */
        .obstacle {
            position: absolute;
            top: -100px;
            width: 40px;
            height: 70px;
            border-radius: 6px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.4);
            z-index: 5;
        }
        /* Фары врагов (красные сзади) */
        .obstacle::after { content: ''; position: absolute; bottom: 5px; left: 3px; width: 6px; height: 6px; background: #ff0000; border-radius: 2px; box-shadow: 28px 0 0 #ff0000; }

        .score-panel {
            margin-top: 5px;
            font-size: 20px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 2px 0 #000;
        }

        /* Видимые кнопки управления */
        .controls-ui {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 300px;
            margin-top: 15px;
        }

        .ctrl-btn {
            background-color: #3390ec;
            border: none;
            border-radius: 15px;
            height: 80px;
            font-size: 30px;
            color: white;
            box-shadow: 0 4px 0 #1c68b3;
            cursor: pointer;
        }
        .ctrl-btn:active {
            box-shadow: 0 0 0;
            transform: translateY(4px);
            background-color: #2b7bc9;
        }

        /* Экран Game Over */
        #game-over {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #ff3b30;
            z-index: 30;
            width: 220px;
            box-shadow: 0 0 30px rgba(255, 59, 48, 0.3);
        }
        
        #game-over button {
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #34c759;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <a href="index.html" class="home-btn">🏠</a>

    <div class="score-panel">SCORE: <span id="score">0</span> | LVL: <span id="level">1</span></div>

    <div id="game-container">
        <div class="road-markings" id="road-anim"></div>
        <div id="player"><div class="stripe"></div></div>
    </div>

    <!-- КНОПКИ УПРАВЛЕНИЯ -->
    <div class="controls-ui">
        <button class="ctrl-btn" id="btn-left">⬅️</button>
        <button class="ctrl-btn" id="btn-right">➡️</button>
    </div>

    <div id="game-over">
        <h2 style="color: #ff3b30; margin: 0 0 10px 0;">AVARIA! 💥</h2>
        <p>Ваш счет: <span id="final-score" style="color: white; font-weight: bold; font-size: 24px;">0</span></p>
        <button onclick="restartGame()">Ехать снова</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const player = document.getElementById('player');
        const container = document.getElementById('game-container');
        const roadAnim = document.getElementById('road-anim');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const gameOverScreen = document.getElementById('game-over');

        // Настройки позиций (центры полос)
        // Поле 300px. Полосы: 0-100, 100-200, 200-300.
        // Центры: 50, 150, 250.
        // Машина 40px. Left = Center - 20.
        // 30px, 130px, 230px.
        const positions = [30, 130, 230];
        let playerPos = 1; // Старт по центру

        // Переменные игры
        let score = 0;
        let speed = 5; // Начальная скорость падения
        let spawnRate = 1500; // Начальный интервал спавна (мс)
        let isGameOver = false;
        let obstacles = [];
        let gameLoopId;
        let spawnIntervalId;
        
        // Цвета машинок врагов
        const carColors = ['#8e44ad', '#34c759', '#f39c12', '#bdc3c7', '#1abc9c'];

        function movePlayer(direction) {
            if (isGameOver) return;
            
            let moved = false;
            if (direction === 'left' && playerPos > 0) { playerPos--; moved = true; }
            if (direction === 'right' && playerPos < 2) { playerPos++; moved = true; }
            
            if (moved) {
                player.style.left = positions[playerPos] + 'px';
                // Наклон машинки при повороте (визуальный эффект)
                player.style.transform = direction === 'left' ? 'rotate(-5deg)' : 'rotate(5deg)';
                setTimeout(() => player.style.transform = 'rotate(0deg)', 150);
                
                try { tg.HapticFeedback.selectionChanged(); } catch(e){}
            }
        }

        function createObstacle() {
            if (isGameOver) return;

            const obs = document.createElement('div');
            obs.className = 'obstacle';
            
            // Случайная полоса
            const lane = Math.floor(Math.random() * 3);
            obs.style.left = positions[lane] + 'px';
            obs.style.top = '-100px';
            
            // Случайный цвет
            obs.style.backgroundColor = carColors[Math.floor(Math.random() * carColors.length)];

            container.appendChild(obs);
            obstacles.push({ element: obs, lane: lane, y: -100 });
        }

        function updateGame() {
            if (isGameOver) return;

            // Движение препятствий
            obstacles.forEach((obs, index) => {
                obs.y += speed;
                obs.element.style.top = obs.y + 'px';

                // --- ЛОГИКА СТОЛКНОВЕНИЯ ---
                // Игрок находится по Y: 430px (верх) до 500px (низ) (примерно)
                // Точнее: Container 500px. Bottom 20px. Height 70px.
                // Игрок занимает Y от 410 до 480.
                if (obs.y + 70 >= 410 && obs.y < 480 && obs.lane === playerPos) {
                    endGame();
                }

                // Удаление (проехала вниз)
                if (obs.y > 550) {
                    obs.element.remove();
                    obstacles.splice(index, 1);
                    increaseScore();
                }
            });

            gameLoopId = requestAnimationFrame(updateGame);
        }

        function increaseScore() {
            score++;
            scoreEl.innerText = score;

            // --- УВЕЛИЧЕНИЕ СЛОЖНОСТИ (Каждые 5 очков) ---
            if (score % 5 === 0) {
                // 1. Увеличиваем скорость
                speed += 0.8;
                
                // 2. Уменьшаем время между появлением врагов (чаще трафик)
                if (spawnRate > 500) { // Не быстрее чем раз в 0.5 сек
                    spawnRate -= 120;
                    
                    // Перезапускаем таймер спавна с новым временем
                    clearInterval(spawnIntervalId);
                    spawnIntervalId = setInterval(createObstacle, spawnRate);
                }

                // Визуальное ускорение дороги
                let animSpeed = 0.8 - (score * 0.01); 
                if (animSpeed < 0.2) animSpeed = 0.2;
                roadAnim.style.animationDuration = animSpeed + 's';
                
                // Обновляем уровень на экране (каждые 5 очков = +1 лвл сложности)
                levelEl.innerText = 1 + (score / 5);
            }
        }

        function endGame() {
            isGameOver = true;
            cancelAnimationFrame(gameLoopId);
            clearInterval(spawnIntervalId);
            try { tg.HapticFeedback.notificationOccurred('error'); } catch(e){}
            
            document.getElementById('final-score').innerText = score;
            gameOverScreen.style.display = 'block';
            roadAnim.style.animationPlayState = 'paused';
        }

        function restartGame() {
            obstacles.forEach(o => o.element.remove());
            obstacles = [];
            score = 0;
            speed = 5;
            spawnRate = 1500;
            isGameOver = false;
            playerPos = 1;
            player.style.left = positions[1] + 'px';
            player.style.transform = 'rotate(0deg)';
            
            scoreEl.innerText = '0';
            levelEl.innerText = '1';
            gameOverScreen.style.display = 'none';
            
            roadAnim.style.animationPlayState = 'running';
            roadAnim.style.animationDuration = '0.8s';

            startGame();
        }

        function startGame() {
            updateGame();
            spawnIntervalId = setInterval(createObstacle, spawnRate);
        }

        // Кнопки на экране
        // Используем mousedown/touchstart для быстрой реакции
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');

        btnLeft.addEventListener('mousedown', () => movePlayer('left'));
        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer('left'); });

        btnRight.addEventListener('mousedown', () => movePlayer('right'));
        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer('right'); });
        
        // Клавиатура
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') movePlayer('left');
            if (e.key === 'ArrowRight') movePlayer('right');
        });

        // Запуск
        startGame();

    </script>
</body>
</html>
