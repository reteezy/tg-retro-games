<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris TG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #1c1c1e);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none; /* Отключаем зум и скролл */
        }

        h1 { margin: 10px 0; font-size: 20px; }

        .game-container {
            position: relative;
            border: 2px solid #3390ec;
            background-color: #000;
        }

        canvas {
            display: block;
        }

        .ui-bar {
            width: 320px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 16px;
            font-weight: bold;
        }

        /* Кнопки управления */
        .controls {
            margin-top: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 60px 60px;
            gap: 10px;
            width: 320px;
        }

        .btn {
            background-color: #3390ec;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-shadow: 0 4px 0 #1f6ebc; /* Эффект 3D кнопки */
        }

        .btn:active {
            box-shadow: 0 0 0;
            transform: translateY(4px);
        }

        .btn-rotate {
            grid-column: 2;
            grid-row: 1;
            background-color: #8e44ad; /* Фиолетовая для вращения */
            box-shadow: 0 4px 0 #6c3483;
        }

        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        /* Экран Game Over */
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #3390ec;
            z-index: 10;
            width: 200px;
        }

        #restart-btn {
            margin-top: 15px;
            padding: 12px 24px;
            font-size: 16px;
            background-color: #3390ec;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    
<!-- Кнопка НАЗАД В МЕНЮ -->
<a href="index.html" style="position: absolute; top: 10px; left: 10px; text-decoration: none; font-size: 24px; z-index: 100;">🏠</a>

  
    <div class="ui-bar">
        <span>Счет: <span id="score">0</span></span>
        <span>Рекорд: <span id="high-score">0</span></span>
    </div>

    <div class="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        
        <div id="game-over">
            <h2 style="color: #ff3b30">GAME OVER</h2>
            <p>Счет: <span id="final-score">0</span></p>
            <button id="restart-btn">Заново</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-rotate" id="rotate">↻</button>
        <button class="btn btn-left" id="left">⬅️</button>
        <button class="btn btn-down" id="down">⬇️</button>
        <button class="btn btn-right" id="right">➡️</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');
        
        // Масштабируем содержимое канваса x20 (размер клетки)
        context.scale(20, 20);

        // --- ЛОГИКА ИГРЫ ---
        
        let score = 0;
        let highScore = localStorage.getItem('tetrisHighScore') || 0;
        highScoreElement.innerText = highScore;

        // Фигуры (Тетрамино)
        const pieces = 'ILJOTSZ';
        const colors = [
            null,
            '#FF0D72', // T - Маджента
            '#0DC2FF', // I - Голубой
            '#0DFF72', // S - Зеленый
            '#F538FF', // Z - Розовый (на самом деле Z красный, но пусть будет ярче)
            '#FF8E0D', // L - Оранжевый
            '#FFE138', // O - Желтый
            '#3877FF', // J - Синий
        ];

        function createPiece(type) {
            if (type === 'I') {
                return [
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                ];
            } else if (type === 'L') {
                return [
                    [0, 2, 0],
                    [0, 2, 0],
                    [0, 2, 2],
                ];
            } else if (type === 'J') {
                return [
                    [0, 3, 0],
                    [0, 3, 0],
                    [3, 3, 0],
                ];
            } else if (type === 'O') {
                return [
                    [4, 4],
                    [4, 4],
                ];
            } else if (type === 'Z') {
                return [
                    [5, 5, 0],
                    [0, 5, 5],
                    [0, 0, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 6, 6],
                    [6, 6, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'T') {
                return [
                    [0, 7, 0],
                    [7, 7, 7],
                    [0, 0, 0],
                ];
            }
        }

        // Создаем игровое поле (матрица 12x20)
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        const arena = createMatrix(12, 20);

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
        };

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        // Рисуем блок
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // Добавляем рамку для красоты
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'black';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            // Если после поворота фигура застряла в стене, отодвигаем её
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function collide(arena, player) {
            const m = player.matrix;
            const o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function playerReset() {
            const piecesStr = 'TJLOSZI';
            player.matrix = createPiece(piecesStr[piecesStr.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            // Если сразу столкновение — Game Over
            if (collide(arena, player)) {
                gameOver();
            }
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length -1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }

                // Линия собрана
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;

                score += rowCount * 10;
                rowCount *= 2;
                scoreElement.innerText = score;
                
                // Вибрация при сборе линии
                try{ tg.HapticFeedback.notificationOccurred('success'); }catch(e){}
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000; // Начальная скорость (1 сек)
        let lastTime = 0;
        let isPaused = false;

        function update(time = 0) {
            if (isPaused) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--; // Поднимаем обратно
                merge(arena, player); // Закрепляем
                playerReset(); // Новая фигура
                arenaSweep(); // Проверка линий
                
                // Легкая вибрация при падении
                try{ tg.HapticFeedback.impactOccurred('light'); }catch(e){}
            }
            dropCounter = 0;
        }

        function playerMove(offset) {
            player.pos.x += offset;
            if (collide(arena, player)) {
                player.pos.x -= offset;
            }
        }

        function gameOver() {
            isPaused = true;
            try{ tg.HapticFeedback.notificationOccurred('error'); }catch(e){}
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('tetrisHighScore', highScore);
                highScoreElement.innerText = highScore;
            }
            finalScoreElement.innerText = score;
            gameOverScreen.style.display = 'block';
        }

        // --- УПРАВЛЕНИЕ ---

        document.getElementById('left').onclick = () => { if(!isPaused) playerMove(-1); };
        document.getElementById('right').onclick = () => { if(!isPaused) playerMove(1); };
        document.getElementById('rotate').onclick = () => { if(!isPaused) playerRotate(1); };
        document.getElementById('down').onclick = () => { if(!isPaused) playerDrop(); };

        // Управление клавиатурой (для ПК)
        document.addEventListener('keydown', event => {
            if (isPaused) return;
            if (event.keyCode === 37) { playerMove(-1); }
            else if (event.keyCode === 39) { playerMove(1); }
            else if (event.keyCode === 40) { playerDrop(); }
            else if (event.keyCode === 38) { playerRotate(1); } // Вверх - поворот
        });

        document.getElementById('restart-btn').onclick = () => {
            arena.forEach(row => row.fill(0));
            score = 0;
            scoreElement.innerText = score;
            gameOverScreen.style.display = 'none';
            isPaused = false;
            playerReset();
            update();
        };

        // Старт
        playerReset();
        update();

    </script>
</body>
</html>
