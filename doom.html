<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOOM TG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Библиотека эмулятора (движок берем с CDN, это безопасно) -->
    <script src="https://js-dos.com/6.22/current/js-dos.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1c1c1e;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Контейнер для игры */
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Кнопка Домой */
        .home-btn {
            position: absolute; 
            top: 15px; 
            left: 15px; 
            width: 40px; 
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none; 
            font-size: 20px; 
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        /* Экран загрузки */
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #3390ec;
            font-family: monospace;
            font-size: 16px;
            text-align: center;
            z-index: 10;
        }
        
        /* Стили для мобильного управления js-dos */
        .dosbox-container {
            width: 100% !important;
            height: 100% !important;
        }
        
        /* Исправление, чтобы клавиатура не вылезала */
        canvas {
            touch-action: none; 
        }
    </style>
</head>
<body>

    <a href="index.html" class="home-btn">🏠</a>
    
    <div id="loading">Инициализация...<br>Загрузка файлов...</div>
    <canvas id="canvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById("canvas");
        const loading = document.getElementById("loading");

        // Настраиваем DOSBox
        Dos(canvas, { 
            // Эти файлы движка берем с официального сайта, они работают стабильно
            wdosboxUrl: "https://js-dos.com/6.22/current/wdosbox.js",
            cycles: 25000,  // 1000 было слишком медленно; 25000 — оптимально для Doom
            autolock: false,
            // Сенсорное управление для телефона (SDL scancodes)
            jsdosConf: {
                layersConfig: {
                    version: 2,
                    layers: [{
                        grid: "square",
                        title: "Doom",
                        controls: [
                            // D-pad: движение
                            { row: 0, column: 1, symbol: "↑", type: "Key", mapTo: [82] },
                            { row: 2, column: 1, symbol: "↓", type: "Key", mapTo: [81] },
                            { row: 1, column: 0, symbol: "←", type: "Key", mapTo: [80] },
                            { row: 1, column: 2, symbol: "→", type: "Key", mapTo: [79] },
                            // Действия справа
                            { row: 0, column: 4, symbol: "🔫", type: "Key", mapTo: [224] },
                            { row: 1, column: 4, symbol: "E", type: "Key", mapTo: [40] },
                            { row: 2, column: 4, symbol: "▶", type: "Key", mapTo: [44] },
                            // Клавиатура для доп. клавиш
                            { row: 3, column: 2, symbol: "⌨", type: "Keyboard" }
                        ]
                    }]
                }
            },
            scaleControls: 0.28
        }).ready(function (fs, main) {
            
            loading.innerHTML = "Распаковка DOOM...";

            // ВАЖНО: Здесь мы указываем имя твоего файла, который ты загрузил на GitHub
            fs.extract("doom.zip").then(function () {
                
                loading.style.display = 'none'; // Скрываем надпись загрузки
                
                // Запускаем EXE файл внутри архива
                main(["-c", "DOOM.EXE"]).then(function (ci) {
                    console.log("Doom started");
                });
            }).catch(function(err) {
                loading.innerHTML = "Ошибка загрузки:<br>" + err;
                loading.style.color = "red";
            });
        });
    </script>
</body>
</html>
