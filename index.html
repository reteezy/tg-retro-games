<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Boy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #1c1c1e);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { text-transform: uppercase; letter-spacing: 2px; color: #3390ec; }
        
        .game-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .game-card {
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2e);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            border: 2px solid transparent;
            position: relative;
            display: block; /* Важно для ссылок */
        }

        .game-card:hover { transform: translateY(-3px); border-color: #3390ec; }
        .icon { font-size: 40px; display: block; margin-bottom: 10px; }
        .title { font-weight: bold; font-size: 14px; }

        /* Стиль для закрытой игры */
        .game-card.locked { 
            opacity: 0.6; 
            filter: grayscale(0.8); 
        }
        
        .lock-icon {
            display: none; 
            position: absolute; top: 10px; right: 10px; font-size: 16px;
        }

        .game-card.locked .lock-icon { display: block; }
        
        /* Текст для отладки (потом уберем) */
        #debug-info {
            margin-top: 30px;
            font-size: 10px;
            color: #555;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h1>Retro Boy</h1>

    <div class="game-list">
        <!-- Змейка -->
        <a href="zmei-index.html" class="game-card">
            <span class="icon">🐍</span>
            <span class="title">Snake</span>
        </a>

        <!-- Тетрис -->
        <a href="tetris-index.html" class="game-card">
            <span class="icon">🧱</span>
            <span class="title">Tetris</span>
        </a>

        <!-- ГОНКИ: Внимание на этот блок -->
        <!-- По умолчанию ставим onclick для проверки -->
        <div id="racer-card" class="game-card locked" onclick="showBuyPopup()">
            <span class="lock-icon">🔒</span>
            <span class="icon">🏎️</span>
            <span class="title">Racer</span>
        </div>

        <!-- Магазин -->
        <a href="shop.html" class="game-card" style="border-color: #ff9500;">
            <span class="icon">🛒</span>
            <span class="title">Shop</span>
        </a>
    </div>

    <div id="debug-info">Загрузка данных...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Проверяем память
        const isRacerOwned = localStorage.getItem('game_unlock_racer') === 'true';
        
        // Вывод отладки на экран (чтобы ты видел, что происходит)
        document.getElementById('debug-info').innerText = 
            "Статус Racer: " + (isRacerOwned ? "КУПЛЕНО" : "НЕ КУПЛЕНО");

        const racerCard = document.getElementById('racer-card');

        if (isRacerOwned) {
            // 1. Убираем визуальный замок
            racerCard.classList.remove('locked');
            
            // 2. УДАЛЯЕМ старый onclick (чтобы не было конфликтов)
            racerCard.onclick = null;
            
            // 3. Превращаем div в ссылку через JavaScript
            racerCard.addEventListener('click', function() {
                // Прямой переход. Если racer.html существует, он откроется.
                window.location.href = 'racer.html';
            });
            
            // (Дополнительно) Меняем курсор
            racerCard.style.cursor = "pointer";
        }

        function showBuyPopup() {
            // Если игра куплена, эта функция даже не должна вызываться, 
            // но на всякий случай оставим проверку
            if (localStorage.getItem('game_unlock_racer') === 'true') {
                window.location.href = 'racer.html';
                return;
            }

            tg.showPopup({
                title: 'Закрыто 🔒',
                message: 'Купите доступ в Магазине!',
                buttons: [
                    {type: 'default', text: 'Купить', id: 'go_shop'},
                    {type: 'cancel'}
                ]
            }, function(btnId) {
                if (btnId === 'go_shop') {
                    window.location.href = 'shop.html';
                }
            });
        }
    </script>
</body>
</html>
