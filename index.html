<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Boy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #1c1c1e);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: sans-serif;
            margin: 0;
            /* Добавили отступ снизу, чтобы таб-бар не перекрывал контент */
            padding: 20px 20px 90px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { text-transform: uppercase; letter-spacing: 2px; color: #3390ec; }
        
        .game-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .game-card {
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2e);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            border: 2px solid transparent;
            position: relative;
            display: block;
            transition: transform 0.2s;
        }

        .game-card:hover { transform: translateY(-3px); border-color: #3390ec; }
        .icon { font-size: 40px; display: block; margin-bottom: 10px; }
        .title { font-weight: bold; font-size: 14px; }

        .game-card.locked { opacity: 0.6; filter: grayscale(0.8); }
        .lock-icon { display: none; position: absolute; top: 10px; right: 10px; font-size: 16px; }
        .game-card.locked .lock-icon { display: block; }
        
        /* --- СТИЛИ ДЛЯ ТАБ-БАРА (НИЖНЕЕ МЕНЮ) --- */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2e);
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding-bottom: 10px; /* Учет полоски жестов на iPhone */
            box-sizing: border-box; /* Чтобы padding не увеличивал ширину */
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8e8e93; /* Серый цвет для неактивных */
            font-size: 10px;
            cursor: pointer;
            width: 25%;
            height: 100%;
        }

        .tab-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        /* Активная кнопка (где мы сейчас) */
        .tab-item.active {
            color: var(--tg-theme-button-color, #3390ec);
        }
        
        #debug-info { margin-top: 30px; font-size: 10px; color: #555; }
    </style>
</head>
<body>

    <h1>Retro Boy</h1>

    <div class="game-list">
        <!-- Змейка -->
        <a href="zmei-index.html" class="game-card">
            <span class="icon">🐍</span>
            <span class="title">Snake</span>
        </a>

        <!-- Тетрис -->
        <a href="tetris-index.html" class="game-card">
            <span class="icon">🧱</span>
            <span class="title">Tetris</span>
        </a>

        <!-- ГОНКИ -->
        <div id="racer-card" class="game-card locked" onclick="showBuyPopup()">
            <span class="lock-icon">🔒</span>
            <span class="icon">🏎️</span>
            <span class="title">Racer</span>
        </div>

        <!-- Магазин -->
        <a href="shop.html" class="game-card" style="border-color: #ff9500;">
            <span class="icon">🛒</span>
            <span class="title">Shop</span>
        </a>
    </div>

    <!-- ТАБ-БАР -->
    <nav class="tab-bar">
        <div class="tab-item active">
            <div class="tab-icon">🏠</div>
            <span>Домой</span>
        </div>
        <div class="tab-item">
            <div class="tab-icon">🏆</div>
            <span>Топ</span>
        </div>
        <div class="tab-item">
            <div class="tab-icon">👤</div>
            <span>Профиль</span>
        </div>
        <div class="tab-item">
            <div class="tab-icon">⚙️</div>
            <span>Настройки</span>
        </div>
    </nav>

    <div id="debug-info">Загрузка данных...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const isRacerOwned = localStorage.getItem('game_unlock_racer') === 'true';
        document.getElementById('debug-info').innerText = "Статус Racer: " + (isRacerOwned ? "КУПЛЕНО" : "НЕ КУПЛЕНО");

        const racerCard = document.getElementById('racer-card');

        if (isRacerOwned) {
            racerCard.classList.remove('locked');
            racerCard.onclick = null;
            racerCard.addEventListener('click', function() { window.location.href = 'racer.html'; });
            racerCard.style.cursor = "pointer";
        }

        function showBuyPopup() {
            if (localStorage.getItem('game_unlock_racer') === 'true') {
                window.location.href = 'racer.html';
                return;
            }
            tg.showPopup({
                title: 'Закрыто 🔒',
                message: 'Купите доступ в Магазине!',
                buttons: [
                    {type: 'default', text: 'Купить', id: 'go_shop'},
                    {type: 'cancel'}
                ]
            }, function(btnId) {
                if (btnId === 'go_shop') { window.location.href = 'shop.html'; }
            });
        }
    </script>
</body>
</html>
