<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Boy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #1c1c1e);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { text-transform: uppercase; letter-spacing: 2px; color: #3390ec; }
        
        .game-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .game-card {
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2e);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            border: 2px solid transparent;
            position: relative;
        }

        .game-card:hover { transform: translateY(-3px); border-color: #3390ec; }
        .icon { font-size: 40px; display: block; margin-bottom: 10px; }
        .title { font-weight: bold; font-size: 14px; }

        /* Стиль для закрытой игры */
        .locked { opacity: 0.6; filter: grayscale(0.8); }
        .lock-icon {
            position: absolute; top: 10px; right: 10px; font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>Retro Boy</h1>

    <div class="game-list">
        <!-- Бесплатная Змейка -->
        <a href="zmei-index.html" class="game-card">
            <span class="icon">🐍</span>
            <span class="title">Snake</span>
        </a>

        <!-- Бесплатный Тетрис -->
        <a href="tetris-index.html" class="game-card">
            <span class="icon">🧱</span>
            <span class="title">Tetris</span>
        </a>

        <!-- ПЛАТНАЯ ИГРА (ПРИМЕР) -->
        <!-- Обрати внимание: onclick вместо href -->
        <div class="game-card locked" onclick="checkAccess('game_unlock_racer', 'racer.html')">
            <span class="lock-icon">🔒</span>
            <span class="icon">🏎️</span>
            <span class="title">Racer</span>
        </div>

        <!-- Магазин -->
        <a href="shop.html" class="game-card" style="border-color: #ff9500;">
            <span class="icon">🛒</span>
            <span class="title">Shop</span>
        </a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Функция проверки доступа
        function checkAccess(productId, url) {
            const isOwned = localStorage.getItem(productId) === 'true';
            
            if (isOwned) {
                // Если куплено - переходим в игру
                window.location.href = url;
            } else {
                // Если нет - предлагаем купить
                tg.showPopup({
                    title: 'Доступ закрыт',
                    message: 'Эту игру нужно разблокировать в Магазине.',
                    buttons: [
                        {type: 'default', text: 'В магазин', id: 'go_shop'},
                        {type: 'cancel'}
                    ]
                }, function(btnId) {
                    if (btnId === 'go_shop') {
                        window.location.href = 'shop.html';
                    }
                });
            }
        }
        
        // Визуально убираем замок, если игра куплена (для красоты)
        // Пример: если Racer куплен, убираем класс locked
        if (localStorage.getItem('game_unlock_racer') === 'true') {
             // Логика обновления стилей (можно дописать позже)
        }
    </script>
</body>
</html>
